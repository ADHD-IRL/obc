<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsidian Knight Consulting</title>
  <meta name="description" content="Obsidian Knight Consulting — precision, operational excellence, and technological advantage." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgdmlld0JveD0iMCAwIDE4MCAxODAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiByeD0iMzYiIGZpbGw9IiNGRjNDMDAiLz4KPC9zdmc+Cg==" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Video */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
    }

    @media (max-width: 768px) {
      #bg-video {
        object-fit: cover;
        object-position: 60% center;
      }
    }

    @media (max-width: 480px) {
      #bg-video {
        object-position: 70% center;
      }
    }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.25) 40%,
        rgba(0,0,0,0.55) 80%,
        rgba(0,0,0,0.82) 100%
      );
    }

    /* Noise grain */
    #overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    /* Content */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding-top: clamp(2rem, 6vh, 4rem);
      padding-bottom: clamp(3rem, 9vh, 6rem);
      text-align: center;
      animation: fade-up 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }

    .top-text {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bottom-cta {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wordmark {
      font-size: clamp(0.55rem, 1vw, 0.7rem);
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.9rem;
    }

    .title {
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 0.6rem;
    }

    .title span { color: hsl(217, 91%, 68%); }

    .tagline {
      font-size: clamp(0.7rem, 1.3vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      margin-bottom: clamp(2.2rem, 5.5vh, 4rem);
    }

    /* Enter Button */
    @keyframes glow-shift {
      0%   { box-shadow: 0 0 18px 5px hsl(217 91% 60% / 0.55), 0 0 45px 10px hsl(217 91% 60% / 0.18); }
      33%  { box-shadow: 0 0 22px 6px hsl(197 91% 62% / 0.65), 0 0 55px 12px hsl(197 91% 62% / 0.22); }
      66%  { box-shadow: 0 0 22px 6px hsl(237 91% 72% / 0.65), 0 0 55px 12px hsl(237 91% 72% / 0.22); }
      100% { box-shadow: 0 0 18px 5px hsl(217 91% 60% / 0.55), 0 0 45px 10px hsl(217 91% 60% / 0.18); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.9rem 2.6rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      background: hsl(217, 91%, 52%);
      border: 1px solid hsl(217, 91%, 72% / 0.35);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    .enter-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,0.16) 50%, transparent 62%);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .enter-btn:hover {
      animation: glow-shift 2.2s ease-in-out infinite;
      transform: translateY(-2px);
      background: hsl(217, 91%, 58%);
    }
    .enter-btn:hover::after {
      opacity: 1;
      animation: shimmer 1.6s linear infinite;
    }

    .enter-btn svg {
      width: 13px; height: 13px;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .enter-btn:hover svg { transform: translateX(4px); }

    @media (max-width: 768px) {
      .top-text { display: none; }
      .tagline  { display: none; }

      #content {
        justify-content: center;
        padding-top: 0;
        padding-bottom: 0;
      }

      .bottom-cta {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .enter-btn { padding: 0.8rem 2rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="/public/okc.mp4" type="video/mp4">
  </video>

  <div id="overlay"></div>

  <div id="content">
    <div class="top-text">
      <p class="wordmark">Est. MMXXIV</p>
      <h1 class="title">Obsidian Knight<br><span>Consulting</span></h1>
    </div>
    <div class="bottom-cta">
      <p class="tagline">Precision &nbsp;&middot;&nbsp; Discretion &nbsp;&middot;&nbsp; Advantage</p>
      <a href="/consulting.html" class="enter-btn">
        Enter
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>

</body>
</html>
