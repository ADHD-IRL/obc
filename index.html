/* ===== Glowing Button Effects ===== */
@keyframes glow-shift {
  0%   { box-shadow: 0 0 8px 2px hsl(217 91% 60% / 0.5), 0 0 20px 4px hsl(217 91% 60% / 0.2); }
  33%  { box-shadow: 0 0 12px 3px hsl(197 91% 60% / 0.6), 0 0 28px 6px hsl(197 91% 60% / 0.25); }
  66%  { box-shadow: 0 0 12px 3px hsl(237 91% 70% / 0.6), 0 0 28px 6px hsl(237 91% 70% / 0.25); }
  100% { box-shadow: 0 0 8px 2px hsl(217 91% 60% / 0.5), 0 0 20px 4px hsl(217 91% 60% / 0.2); }
}
@keyframes btn-shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Hero CTA button */
a[href="#contact"].inline-flex,
a.inline-flex.bg-primary {
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s ease, transform 0.2s ease, background-color 0.3s ease !important;
}
a[href="#contact"].inline-flex:hover,
a.inline-flex.bg-primary:hover {
  animation: glow-shift 2s ease-in-out infinite;
  transform: translateY(-2px);
}

/* Submit / primary buttons */
button[type="submit"].bg-primary,
button.bg-primary {
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s ease, transform 0.2s ease, background-color 0.3s ease !important;
}
button[type="submit"].bg-primary:hover,
button.bg-primary:hover {
  animation: glow-shift 2s ease-in-out infinite;
  transform: translateY(-1px);
}

/* Shimmer overlay on hover */
a[href="#contact"].inline-flex::after,
a.inline-flex.bg-primary::after,
button[type="submit"].bg-primary::after,
button.bg-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
  background-size: 200% 100%;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
